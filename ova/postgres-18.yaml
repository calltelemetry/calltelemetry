services:
  db:
    image: "calltelemetry/postgres:18"
    user: root
    shm_size: "${PG_SHM_SIZE:-1gb}"
    environment:
      - POSTGRESQL_MAX_CONNECTIONS=300
      - PGDATA=/bitnami/postgresql/data
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=${PG_SHARED_BUFFERS:-512MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1536MB}
      -c work_mem=${PG_WORK_MEM:-8MB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      -c wal_buffers=64MB
      -c max_wal_size=4GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c autovacuum_max_workers=5
      -c autovacuum_vacuum_scale_factor=0.05
      -c autovacuum_analyze_scale_factor=0.02
      -c autovacuum_vacuum_cost_delay=2
      -c log_min_duration_statement=2000
    volumes:
      - ./postgres-data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calltelemetry -d calltelemetry_prod"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

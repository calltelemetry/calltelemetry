name: Package Release Bundle

on:
  # Triggered explicitly by Unified Release workflow (no release:published dependency)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to package (e.g., 0.8.4-rc191)'
        required: true
        type: string
      stable:
        description: 'Mark as stable release (updates latest-stable.txt)'
        required: false
        type: boolean
        default: false

env:
  GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
  BUNDLE_NAME: calltelemetry-bundle

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Packaging version: $VERSION"

      - name: Create bundle directory
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"

          mkdir -p "$BUNDLE_DIR"
          echo "📁 Created bundle directory: $BUNDLE_DIR"

      - name: Install yq for YAML parsing
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Copy files from manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"
          MANIFEST="ova/bundle-manifest.yml"

          if [ ! -f "$MANIFEST" ]; then
            echo "❌ Manifest not found: $MANIFEST"
            exit 1
          fi

          echo "📋 Reading manifest: $MANIFEST"

          # Copy scripts
          echo "--- Scripts ---"
          for script in $(yq '.scripts[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "ova/$script" ]; then
              cp "ova/$script" "$BUNDLE_DIR/"
              chmod +x "$BUNDLE_DIR/$script"
              echo "✅ $script"
            else
              echo "⚠️  Missing: ova/$script"
            fi
          done

          # Copy configs
          echo "--- Configs ---"
          for config in $(yq '.configs[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "ova/$config" ]; then
              cp "ova/$config" "$BUNDLE_DIR/"
              echo "✅ $(basename $config)"
            else
              echo "⚠️  Missing: ova/$config"
            fi
          done

          # Copy prometheus
          echo "--- Prometheus ---"
          mkdir -p "$BUNDLE_DIR/prometheus"
          for file in $(yq '.prometheus[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "ova/$file" ]; then
              cp "ova/$file" "$BUNDLE_DIR/prometheus/"
              echo "✅ $(basename $file)"
            fi
          done

          # Copy grafana dashboards
          echo "--- Grafana Dashboards ---"
          mkdir -p "$BUNDLE_DIR/grafana/dashboards"
          for file in $(yq '.grafana.dashboards[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "ova/$file" ]; then
              cp "ova/$file" "$BUNDLE_DIR/grafana/dashboards/"
              echo "✅ $(basename $file)"
            fi
          done

          # Copy grafana provisioning
          echo "--- Grafana Provisioning ---"
          mkdir -p "$BUNDLE_DIR/grafana/provisioning/datasources"
          mkdir -p "$BUNDLE_DIR/grafana/provisioning/dashboards"
          for file in $(yq '.grafana.provisioning[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "ova/$file" ]; then
              # Determine subdirectory from path
              if echo "$file" | grep -q "datasources"; then
                cp "ova/$file" "$BUNDLE_DIR/grafana/provisioning/datasources/"
              elif echo "$file" | grep -q "dashboards"; then
                cp "ova/$file" "$BUNDLE_DIR/grafana/provisioning/dashboards/"
              fi
              echo "✅ $(basename $file)"
            fi
          done

      - name: Copy OpenTelemetry Collector config
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"
          MANIFEST="ova/bundle-manifest.yml"

          echo "--- OpenTelemetry Collector ---"
          mkdir -p "$BUNDLE_DIR/otel-collector"
          for file in $(yq '.otel[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "ova/$file" ]; then
              cp "ova/$file" "$BUNDLE_DIR/otel-collector/"
              echo "✅ $(basename $file)"
            elif [ -f "$file" ]; then
              cp "$file" "$BUNDLE_DIR/otel-collector/"
              echo "✅ $(basename $file) (from root)"
            fi
          done

      - name: Copy Tempo config
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"
          MANIFEST="ova/bundle-manifest.yml"

          echo "--- Tempo ---"
          mkdir -p "$BUNDLE_DIR/tempo"
          for file in $(yq '.tempo[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "$file" ]; then
              cp "$file" "$BUNDLE_DIR/tempo/"
              echo "✅ $(basename $file)"
            else
              echo "⚠️  Not found: $file"
            fi
          done

      - name: Copy Loki config
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"
          MANIFEST="ova/bundle-manifest.yml"

          echo "--- Loki ---"
          mkdir -p "$BUNDLE_DIR/loki"
          for file in $(yq '.loki[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "$file" ]; then
              cp "$file" "$BUNDLE_DIR/loki/"
              echo "✅ $(basename $file)"
            else
              echo "⚠️  Not found: $file"
            fi
          done

      - name: Copy Alloy config
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"
          MANIFEST="ova/bundle-manifest.yml"

          echo "--- Alloy ---"
          mkdir -p "$BUNDLE_DIR/alloy"
          for file in $(yq '.alloy[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "$file" ]; then
              cp "$file" "$BUNDLE_DIR/alloy/"
              echo "✅ $(basename $file)"
            else
              echo "⚠️  Not found: $file"
            fi
          done

      - name: Copy JTAPI overlay (backwards compat)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"
          MANIFEST="ova/bundle-manifest.yml"

          echo "--- JTAPI (legacy overlay — kept for backwards compat) ---"
          for file in $(yq '.jtapi[]' "$MANIFEST" 2>/dev/null); do
            if [ -f "$file" ]; then
              cp "$file" "$BUNDLE_DIR/"
              echo "✅ $(basename $file)"
            else
              echo "⚠️  Missing: $file (JTAPI overlay not found at repo root)"
            fi
          done

      - name: Copy .env.example
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"

          echo "--- Environment Template ---"
          if [ -f ".env.example" ]; then
            cp ".env.example" "$BUNDLE_DIR/.env.example"
            echo "✅ .env.example"
          else
            echo "⚠️  .env.example not found"
          fi

      - name: Verify version-specific files exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # REQUIRE version-specific compose file - no fallbacks
          if [ -f "ova/versions/${VERSION}.yml" ]; then
            echo "✅ Found: ova/versions/${VERSION}.yml"
          elif [ -f "ova/versions/${VERSION}.yaml" ]; then
            echo "✅ Found: ova/versions/${VERSION}.yaml"
          else
            echo ""
            echo "❌ ERROR: No docker-compose file found for version ${VERSION}"
            echo ""
            echo "Expected one of:"
            echo "  - ova/versions/${VERSION}.yml"
            echo "  - ova/versions/${VERSION}.yaml"
            echo ""
            echo "Available versions:"
            ls -1 ova/versions/*.yml ova/versions/*.yaml 2>/dev/null | grep -v "prometheus" | grep -v "caddy" | head -20 || echo "  (none)"
            echo ""
            echo "Create the version file first before running this workflow."
            exit 1
          fi

          # Check for version .env (new approach)
          if [ -f "ova/versions/${VERSION}.env" ]; then
            echo "✅ Found: ova/versions/${VERSION}.env"
          else
            echo "⚠️  No version .env found (ova/versions/${VERSION}.env)"
            echo "   Older releases may not have a .env file — this is OK"
          fi

      - name: Copy docker-compose and .env for version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"

          # Primary: copy the REAL docker-compose.yml from repo root
          # This is the single source of truth — versions come from .env
          if [ -f "docker-compose.yml" ]; then
            cp "docker-compose.yml" "$BUNDLE_DIR/docker-compose.yml"
            echo "✅ Copied: docker-compose.yml (repo root — primary)"
          else
            echo "❌ ERROR: docker-compose.yml not found at repo root"
            exit 1
          fi

          # Copy version-pinned .env (sets image tags for this release)
          if [ -f "ova/versions/${VERSION}.env" ]; then
            cp "ova/versions/${VERSION}.env" "$BUNDLE_DIR/.env"
            echo "✅ Copied: ova/versions/${VERSION}.env -> .env"
          else
            echo "❌ ERROR: No version .env found (ova/versions/${VERSION}.env)"
            echo "   The .env file is required — it pins image versions for this release."
            exit 1
          fi

          # Legacy: keep version-specific YAML for older cli.sh (backwards compat)
          if [ -f "ova/versions/${VERSION}.yaml" ]; then
            cp "ova/versions/${VERSION}.yaml" "$BUNDLE_DIR/docker-compose-legacy.yml"
            echo "✅ Copied: ova/versions/${VERSION}.yaml -> docker-compose-legacy.yml (backwards compat)"
          elif [ -f "ova/versions/${VERSION}.yml" ]; then
            cp "ova/versions/${VERSION}.yml" "$BUNDLE_DIR/docker-compose-legacy.yml"
            echo "✅ Copied: ova/versions/${VERSION}.yml -> docker-compose-legacy.yml (backwards compat)"
          fi

          if ! grep -q '^  traceroute:' "$BUNDLE_DIR/docker-compose.yml"; then
            echo "❌ ERROR: Bundled docker-compose.yml no longer defines service 'traceroute'"
            exit 1
          fi

          if ! grep -q '^  ct-syslog-ingest:' "$BUNDLE_DIR/docker-compose.yml"; then
            echo "❌ ERROR: Bundled docker-compose.yml no longer defines service 'ct-syslog-ingest'"
            exit 1
          fi

          if ! grep -q 'calltelemetry/traceroute-go:' "$BUNDLE_DIR/docker-compose.yml"; then
            echo "❌ ERROR: Bundled docker-compose.yml does not reference calltelemetry/traceroute-go"
            exit 1
          fi

          if ! grep -q 'calltelemetry/ct-syslog-ingest-go:' "$BUNDLE_DIR/docker-compose.yml"; then
            echo "❌ ERROR: Bundled docker-compose.yml does not reference calltelemetry/ct-syslog-ingest-go"
            exit 1
          fi

          if ! grep -q 'calltelemetry/ct-media-go:' "$BUNDLE_DIR/docker-compose.yml"; then
            echo "❌ ERROR: Bundled docker-compose.yml does not reference calltelemetry/ct-media-go"
            exit 1
          fi

          if grep -q 'calltelemetry/ct-media:' "$BUNDLE_DIR/docker-compose.yml"; then
            echo "❌ ERROR: Bundled docker-compose.yml still references legacy calltelemetry/ct-media"
            exit 1
          fi

          if ! grep -q '^TRACEROUTE_VERSION=' "$BUNDLE_DIR/.env"; then
            echo "❌ ERROR: Bundled .env does not contain TRACEROUTE_VERSION"
            exit 1
          fi

          if ! grep -q '^CT_MEDIA_VERSION=' "$BUNDLE_DIR/.env"; then
            echo "❌ ERROR: Bundled .env does not contain CT_MEDIA_VERSION"
            exit 1
          fi

          if grep -q '^CT_MEDIA_VERSION=.*-rc' "$BUNDLE_DIR/.env"; then
            echo "❌ ERROR: Bundled .env contains a legacy unified CT_MEDIA_VERSION instead of a ct-media-go semver tag"
            exit 1
          fi

          if ! grep -q '^CT_SYSLOG_INGEST_VERSION=' "$BUNDLE_DIR/.env"; then
            echo "❌ ERROR: Bundled .env does not contain CT_SYSLOG_INGEST_VERSION"
            exit 1
          fi

          docker compose -f "$BUNDLE_DIR/docker-compose.yml" --env-file "$BUNDLE_DIR/.env" config >/dev/null
          echo "✅ Bundle docker-compose.yml and .env render successfully"

          echo ""
          echo "📋 Bundle contents:"
          ls -laR "$BUNDLE_DIR/"

      - name: Create README for bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"

          cat > "$BUNDLE_DIR/README.txt" << EOF
          CallTelemetry Offline Bundle
          Version: ${VERSION}
          Created: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          Installation:
          1. Extract this bundle to your home directory
          2. Run: chmod +x cli.sh
          3. Run: sudo ./cli.sh offline apply

          Or for online installation:
          1. Run: sudo ./cli.sh update ${VERSION}

          For help: ./cli.sh --help

          https://calltelemetry.com
          EOF
          echo "✅ Created README.txt"

      - name: Create tar.gz bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="${BUNDLE_NAME}-${VERSION}"
          BUNDLE_FILE="${BUNDLE_NAME}-${VERSION}.tar.gz"

          tar -czvf "$BUNDLE_FILE" "$BUNDLE_DIR"

          echo "📦 Created bundle: $BUNDLE_FILE"
          echo "📊 Bundle size: $(du -h $BUNDLE_FILE | cut -f1)"

          # Generate checksum
          sha256sum "$BUNDLE_FILE" > "${BUNDLE_FILE}.sha256"
          echo "🔐 SHA256: $(cat ${BUNDLE_FILE}.sha256)"

          echo "bundle_file=$BUNDLE_FILE" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        if: env.GCS_BUCKET != ''
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        if: env.GCS_BUCKET != ''
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Upload to Google Cloud Storage
        if: env.GCS_BUCKET != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_FILE="${BUNDLE_NAME}-${VERSION}.tar.gz"

          echo "☁️ Uploading to GCS bucket: $GCS_BUCKET"

          # Upload bundle to version-specific folder
          gsutil cp "$BUNDLE_FILE" "gs://${GCS_BUCKET}/releases/${VERSION}/"
          gsutil cp "${BUNDLE_FILE}.sha256" "gs://${GCS_BUCKET}/releases/${VERSION}/"

          # Upload cli.sh and prep.sh to bucket root (always latest)
          gsutil cp "ova/cli.sh" "gs://${GCS_BUCKET}/cli.sh"
          gsutil cp "ova/prep.sh" "gs://${GCS_BUCKET}/prep.sh"
          echo "✅ Uploaded cli.sh and prep.sh to bucket root"

          # Upload postgres override files (available for manual `ct config postgres`)
          for pg_file in ova/postgres-*.yaml; do
            if [ -f "$pg_file" ]; then
              gsutil cp "$pg_file" "gs://${GCS_BUCKET}/$(basename $pg_file)"
              echo "✅ Uploaded $(basename $pg_file)"
            fi
          done

          # NOTE: latest.txt and latest-stable.txt are NOT updated here.
          # Use the "Promote Release" workflow to manually promote a version
          # to latest or stable after validation.

          echo "✅ Uploaded to GCS:"
          echo "   gs://${GCS_BUCKET}/releases/${VERSION}/${BUNDLE_FILE}"
          echo "   gs://${GCS_BUCKET}/cli.sh"
          echo "   gs://${GCS_BUCKET}/prep.sh"
          echo ""
          echo "⚠️  To promote this version to latest, run the Promote Release workflow."

      - name: Upload bundle to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_FILE="${BUNDLE_NAME}-${VERSION}.tar.gz"

          echo "📤 Uploading bundle to GitHub release..."

          gh release upload "$VERSION" \
            "$BUNDLE_FILE" \
            "${BUNDLE_FILE}.sha256" \
            --clobber

          echo "✅ Uploaded to GitHub release: $VERSION"

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.BUNDLE_NAME }}-${{ steps.version.outputs.version }}
          path: |
            ${{ env.BUNDLE_NAME }}-${{ steps.version.outputs.version }}.tar.gz
            ${{ env.BUNDLE_NAME }}-${{ steps.version.outputs.version }}.tar.gz.sha256
          retention-days: 90

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_FILE="${BUNDLE_NAME}-${VERSION}.tar.gz"

          echo "## 📦 Release Bundle Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle:** \`${BUNDLE_FILE}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $(du -h $BUNDLE_FILE | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Contents" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tar -tzf "$BUNDLE_FILE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SHA256 Checksum" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat "${BUNDLE_FILE}.sha256" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          if [ -n "$GCS_BUCKET" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Download URLs" >> $GITHUB_STEP_SUMMARY
            echo "- Bundle: \`gs://${GCS_BUCKET}/releases/${VERSION}/${BUNDLE_FILE}\`" >> $GITHUB_STEP_SUMMARY
            echo "- CLI: \`gs://${GCS_BUCKET}/cli.sh\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Public URLs" >> $GITHUB_STEP_SUMMARY
            echo "- Bundle: https://storage.googleapis.com/${GCS_BUCKET}/releases/${VERSION}/${BUNDLE_FILE}" >> $GITHUB_STEP_SUMMARY
            echo "- CLI: https://storage.googleapis.com/${GCS_BUCKET}/cli.sh" >> $GITHUB_STEP_SUMMARY
            echo "- Prep: https://storage.googleapis.com/${GCS_BUCKET}/prep.sh" >> $GITHUB_STEP_SUMMARY
          fi

name: Sync OVA scripts to GCS

on:
  push:
    paths:
      - ova/reset.sh
      - ova/backup.sh
    branches:
      - master
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCS
        run: |
          echo '${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}' > /tmp/gcs-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcs-key.json --quiet

      - name: Upload OVA scripts to GCS
        run: |
          gcloud storage cp ova/reset.sh gs://ct_releases/reset.sh
          gcloud storage cp ova/backup.sh gs://ct_releases/backup.sh
          echo "Uploaded reset.sh and backup.sh to gs://ct_releases/"

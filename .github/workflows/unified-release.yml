name: Unified Release
run-name: "Unified Release ${{ inputs.version }}"

# Single workflow dispatch that stamps ONE version across all 6 repos.
# Docker builds are triggered by the release:published events.
# After all Docker images are confirmed on Docker Hub, this workflow
# generates OVA version files, packages the release bundle, triggers
# the appliance build, and publishes the release — all automatically.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version stamped on ALL repos (e.g., 0.8.6-rc49)"
        required: true
        type: string
      target_branch:
        description: "Target branch in component repos"
        required: false
        type: string
        default: "0.8.6-release"
      ct_media_version:
        description: "ct-media version override (leave empty to use unified version)"
        required: false
        type: string
      skip_component_releases:
        description: "Skip creating GitHub releases (use existing tags/images)"
        type: boolean
        default: false

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Generate release notes and create draft release
  # ─────────────────────────────────────────────────────────────────
  generate-release-notes:
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.notes.outputs.body }}
      prev_version: ${{ steps.prev.outputs.prev_version }}
    steps:
      - name: Detect previous release
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          PREV=$(gh release list --repo calltelemetry/calltelemetry --limit 1 \
            --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          echo "Previous release: $PREV"
          echo "prev_version=$PREV" >> "$GITHUB_OUTPUT"

      - name: Collect commits across repos
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          PREV="${{ steps.prev.outputs.prev_version }}"

          # Initial draft with build status checklist
          # This will be replaced with public-facing release notes once builds complete
          NOTES="## Call Telemetry $VERSION"
          NOTES="$NOTES"$'\n\n'

          # Build status checklist (replaced with release notes after builds complete)
          NOTES="${NOTES}### Build Status"$'\n'
          NOTES="${NOTES}- [ ] cisco-cdr Docker build"$'\n'
          NOTES="${NOTES}- [ ] ct-quasar Docker build"$'\n'
          NOTES="${NOTES}- [ ] jtapi-sidecar Docker build"$'\n'
          NOTES="${NOTES}- [ ] ct-media Docker build"$'\n'
          NOTES="${NOTES}- [ ] jtapi-operator Docker build"$'\n'
          NOTES="${NOTES}- [ ] tracer Docker build"$'\n'
          NOTES="${NOTES}- [ ] OVA package"$'\n'
          NOTES="$NOTES"$'\n'
          NOTES="${NOTES}---"$'\n\n'
          NOTES="${NOTES}**To upgrade:**"$'\n'
          NOTES="${NOTES}\`\`\`bash"$'\n'
          NOTES="${NOTES}sudo curl -fsSL https://get.calltelemetry.com | sudo sh -s -- update ${VERSION}"$'\n'
          NOTES="${NOTES}\`\`\`"$'\n'

          # Write to output using delimiter
          echo "body<<NOTES_DELIM" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "NOTES_DELIM" >> "$GITHUB_OUTPUT"

      - name: Create draft release on calltelemetry
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"

          # Delete existing draft if re-running
          gh release delete "$VERSION" --repo calltelemetry/calltelemetry --yes 2>/dev/null || true

          # Write release notes to a temp file to avoid shell expansion issues
          # (bare words like "remove" trigger zsh glob errors when passed inline)
          cat > /tmp/release-notes.md << 'NOTES_EOF'
          ${{ steps.notes.outputs.body }}
          NOTES_EOF

          gh release create "$VERSION" \
            --repo calltelemetry/calltelemetry \
            --title "$VERSION" \
            --draft \
            --notes-file /tmp/release-notes.md

          echo "Created draft release: $VERSION"

      - name: Summary
        run: |
          echo "### Draft Release Created: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Previous version: ${{ steps.prev.outputs.prev_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build completions are collected by \`collect-docker-builds.yml\` via repository_dispatch (zero polling)." >> $GITHUB_STEP_SUMMARY
          echo "Watch the draft release page for live build status updates." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Create GitHub releases in all 6 component repos
  # The release:published events trigger Docker builds in each repo.
  # Build completions are reported back via repository_dispatch to
  # collect-docker-builds.yml — NO polling needed.
  # ─────────────────────────────────────────────────────────────────
  create-releases:
    needs: generate-release-notes
    if: ${{ !inputs.skip_component_releases }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: cisco-cdr
            label: cisco-cdr
          - repo: ct-quasar
            label: ct-quasar
          - repo: jtapi-sidecar
            label: jtapi-sidecar
          - repo: ct-media
            label: ct-media
          - repo: jtapi-operator
            label: jtapi-operator
          - repo: tracer
            label: tracer
          - repo: ct-syslog-ingest
            label: ct-syslog-ingest
    steps:
      - name: Create ${{ matrix.label }} release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          REPO="${{ matrix.repo }}"
          VERSION="${{ inputs.version }}"

          # ct-media can have a version override
          if [ "$REPO" = "ct-media" ] && [ -n "${{ inputs.ct_media_version }}" ]; then
            VERSION="${{ inputs.ct_media_version }}"
          fi

          # Determine target branch (tracer uses master)
          TARGET="${{ inputs.target_branch }}"
          if [ "$REPO" = "tracer" ]; then
            TARGET="master"
          fi

          echo "Creating $REPO release: $VERSION (target: $TARGET)"
          NOTES="Unified release $VERSION"$'\n\n'"**Appliance Upgrade Instructions:** https://docs.calltelemetry.com/troubleshoot/upgrade"

          gh release delete "$VERSION" --repo "calltelemetry/$REPO" --yes 2>/dev/null || true
          gh release create "$VERSION" \
            --repo "calltelemetry/$REPO" \
            --target "$TARGET" \
            --title "$VERSION" \
            --latest \
            --notes "$NOTES"

          echo "Created release: calltelemetry/$REPO@$VERSION"

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Wait for Docker images, generate OVA files, package, deploy
  # Polls Docker Hub until all 5 images are available, then runs the
  # full OVA pipeline in sequence. No manual intervention needed.
  # ─────────────────────────────────────────────────────────────────
  finalize:
    needs: [generate-release-notes, create-releases]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Wait for all Docker images on Docker Hub
        run: |
          VERSION="${{ inputs.version }}"
          CT_MEDIA="${{ inputs.ct_media_version || inputs.version }}"

          IMAGES="web:${VERSION} vue:${VERSION} jtapi-sidecar:${VERSION} ct-media:${CT_MEDIA} traceroute:${VERSION} ct-syslog-ingest:${VERSION}"
          MAX_ATTEMPTS=30  # 30 minutes max
          ATTEMPT=0

          echo "Waiting for all Docker images to be available on Docker Hub..."
          echo ""

          while true; do
            ATTEMPT=$((ATTEMPT + 1))
            ALL_READY=true
            echo "=== Poll $ATTEMPT/$MAX_ATTEMPTS ($(date -u +%H:%M:%S UTC)) ==="

            for entry in $IMAGES; do
              IMAGE=$(echo "$entry" | cut -d: -f1)
              TAG=$(echo "$entry" | cut -d: -f2)
              if curl -sf "https://hub.docker.com/v2/repositories/calltelemetry/${IMAGE}/tags/${TAG}/" > /dev/null 2>&1; then
                echo "  ✅ calltelemetry/${IMAGE}:${TAG}"
              else
                echo "  ⏳ calltelemetry/${IMAGE}:${TAG} — not ready"
                ALL_READY=false
              fi
            done

            if [ "$ALL_READY" = true ]; then
              echo ""
              echo "🎉 All 5 Docker images are available!"
              break
            fi

            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo ""
              echo "❌ Timeout: Not all images available after ${MAX_ATTEMPTS} minutes"
              exit 1
            fi

            echo "  Waiting 60s before next poll..."
            echo ""
            sleep 60
          done

      - name: Release Summary
        run: |
          VERSION="${{ inputs.version }}"
          CT_MEDIA="${{ inputs.ct_media_version || inputs.version }}"

          echo "### Unified Release: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All Docker images confirmed available. Proceeding with OVA packaging." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | Tag | Branch |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| cisco-cdr | $VERSION | ${{ inputs.target_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ct-quasar | $VERSION | ${{ inputs.target_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| jtapi-sidecar | $VERSION | ${{ inputs.target_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ct-media | $CT_MEDIA | ${{ inputs.target_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| jtapi-operator | $VERSION | ${{ inputs.target_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tracer | $VERSION | master |" >> $GITHUB_STEP_SUMMARY
          echo "| ct-syslog-ingest | $VERSION | main |" >> $GITHUB_STEP_SUMMARY

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Generate version files
        run: |
          VERSION="${{ inputs.version }}"
          CT_MEDIA="${{ inputs.ct_media_version || inputs.version }}"

          # Find the latest existing version file as template
          TEMPLATE=$(ls -1 ova/versions/*.yaml 2>/dev/null | sort -V | tail -1)
          if [ -z "$TEMPLATE" ]; then
            echo "❌ No version template found in ova/versions/"
            exit 1
          fi

          # Generate .yaml (docker-compose override with version-stamped images)
          if [ ! -f "ova/versions/${VERSION}.yaml" ]; then
            TEMPLATE_VER=$(basename "$TEMPLATE" .yaml)
            sed "s/${TEMPLATE_VER}/${VERSION}/g" "$TEMPLATE" > "ova/versions/${VERSION}.yaml"
            echo "✅ Generated ova/versions/${VERSION}.yaml from ${TEMPLATE_VER}"
          else
            echo "✅ ova/versions/${VERSION}.yaml already exists"
          fi

          # Generate .env (version environment variables)
          TEMPLATE_ENV=$(ls -1 ova/versions/*.env 2>/dev/null | sort -V | tail -1)
          if [ -n "$TEMPLATE_ENV" ] && [ ! -f "ova/versions/${VERSION}.env" ]; then
            TEMPLATE_VER=$(basename "$TEMPLATE_ENV" .env)
            sed "s/${TEMPLATE_VER}/${VERSION}/g" "$TEMPLATE_ENV" > "ova/versions/${VERSION}.env"
            echo "✅ Generated ova/versions/${VERSION}.env"
          fi

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ova/versions/${VERSION}.*
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate version files for ${VERSION}"
            git pull --rebase origin master || git pull --rebase origin main || true
            git push
            echo "✅ Version files pushed"
          fi

      - name: Upload version files to release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"

          # Upload .env and .yaml as release assets
          for ext in env yaml; do
            FILE="ova/versions/${VERSION}.${ext}"
            if [ -f "$FILE" ]; then
              gh release upload "$VERSION" "$FILE" \
                --repo calltelemetry/calltelemetry \
                --clobber
              echo "✅ Uploaded ${FILE} to release"
            fi
          done

      - name: Dispatch Package Release Bundle
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          gh workflow run "Package Release Bundle" \
            --repo calltelemetry/calltelemetry \
            -f version=${{ inputs.version }}
          echo "✅ Package Release Bundle dispatched"

      - name: Dispatch Notify OVA Build
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          gh workflow run "Notify OVA Build" \
            --repo calltelemetry/calltelemetry \
            -f version=${{ inputs.version }}
          echo "✅ Appliance build dispatched (OVA + QCOW2 conversion)"

      - name: Publish release as prerelease (draft → prerelease)
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          # Always publish as prerelease. Use promote-release.yml to
          # mark a validated version as latest/stable.
          gh release edit "$VERSION" \
            --repo calltelemetry/calltelemetry \
            --draft=false \
            --prerelease
          echo "✅ Release $VERSION published as prerelease"
          echo "   To promote: gh workflow run promote-release.yml -f version=$VERSION -f channel=latest"

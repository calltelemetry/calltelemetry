global:
  scrape_interval: 15s
  evaluation_interval: 15s

# AlertManager target
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Alert rules
rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ['localhost:9090']

  # CallTelemetry application metrics (PromEx on CURRI endpoint)
  - job_name: calltelemetry
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['web:4080']
    metric_relabel_configs:
      # Strip the cdrcisco_ OTP app prefix from all app metrics
      - source_labels: [__name__]
        regex: 'cdrcisco_(.*)'
        target_label: __name__
        replacement: '$1'

  # Host machine metrics via node-exporter
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  # PostgreSQL metrics via postgres-exporter
  - job_name: postgresql
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s
    metric_relabel_configs:
      # Drop TimescaleDB internal schema tables — catalog/cache/config, not application tables
      - source_labels: [schemaname]
        regex: '_timescaledb_(catalog|internal|cache|config)'
        action: drop
      # Drop static PostgreSQL config flags — never change, not useful as time-series
      - source_labels: [__name__]
        regex: 'pg_settings_.*'
        action: drop

  # Caddy reverse proxy gateway metrics
  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets: ['caddy:2019']
    scrape_interval: 15s

  # SeaweedFS S3 storage metrics
  - job_name: seaweedfs
    metrics_path: /metrics
    static_configs:
      - targets: ['seaweedfs:9325']
    scrape_interval: 30s

  # NATS JetStream metrics via prometheus-nats-exporter
  - job_name: nats
    metrics_path: /metrics
    static_configs:
      - targets: ['nats-exporter:7777']
    scrape_interval: 30s

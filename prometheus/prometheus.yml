global:
  scrape_interval: 15s
  evaluation_interval: 15s

# AlertManager target
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Alert rules
rule_files:
  - /etc/prometheus/alert_rules.yml
  - /etc/prometheus/custom_rules.yml

scrape_configs:
  - job_name: prometheus
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ['localhost:9090']

  # CallTelemetry application metrics (PromEx on CURRI endpoint)
  - job_name: calltelemetry
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['web:4080']

  # PostgreSQL metrics via postgres-exporter
  - job_name: postgresql
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  # SeaweedFS S3 storage metrics
  - job_name: seaweedfs
    metrics_path: /metrics
    static_configs:
      - targets: ['seaweedfs:9325']
    scrape_interval: 30s

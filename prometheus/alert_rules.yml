# Prometheus Alert Rules for CallTelemetry
# These rules use metrics from the SystemHealth PromEx plugin (ct_* gauges)
# `for:` provides built-in hysteresis — alert only fires if condition persists

groups:
  - name: system_health
    rules:
      - alert: HighDiskUsage
        expr: ct_disk_usage_percent{mount="/"} > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Disk usage {{ $value }}% exceeds 90% on mount {{ $labels.mount }}'
          description: 'Root partition disk usage has been above 90% for 5 minutes.'
          runbook_url: 'https://docs.calltelemetry.com/runbooks/high-disk-usage'

      - alert: HighCPUUsage
        expr: ct_cpu_usage_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'CPU usage {{ $value }}% exceeds 80%'
          description: 'CPU utilization has been above 80% for 5 minutes.'

      - alert: HighMemoryUsage
        expr: ct_memory_usage_percent > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Memory usage {{ $value }}% exceeds 85%'
          description: 'System memory usage has been above 85% for 5 minutes.'

  - name: application_health
    rules:
      - alert: AppDown
        expr: up{job="calltelemetry"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: 'CallTelemetry API is DOWN'
          description: 'The Elixir API has been unreachable for 30 seconds.'
          runbook_url: 'https://docs.calltelemetry.com/runbooks/app-down'

      - alert: NATSDisconnected
        expr: ct_nats_connection_status == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: 'NATS connection lost'
          description: 'The NATS message broker connection has been down for 30 seconds.'

      - alert: HighProcessCount
        expr: ct_beam_process_count > 50000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'BEAM process count {{ $value }} exceeds 50000'
          description: 'High Erlang process count may indicate a resource leak.'

  - name: oban_health
    rules:
      - alert: ObanRetryableJobs
        expr: ct_oban_queue_depth{state="retryable"} > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Oban queue {{ $labels.queue }} has {{ $value }} retryable jobs'
          description: 'High retryable job count may indicate persistent failures.'

      - alert: ObanAvailableBacklog
        expr: ct_oban_queue_depth{state="available"} > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Oban queue {{ $labels.queue }} backlog: {{ $value }} available jobs'
          description: 'Job backlog building up — workers may be overwhelmed.'

  - name: call_health
    rules:
      - alert: PhoneRegistrationDrop
        expr: ct_phones_registration_percent < 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Phone registration dropped to {{ $value }}% on cluster {{ $labels.callmanager_id }}'
          description: 'Less than 95% of phones are registered. Possible CUCM or network issue.'
          runbook_url: 'https://docs.calltelemetry.com/runbooks/phone-registration-drop'

      - alert: PhoneRegistrationCritical
        expr: ct_phones_registration_percent < 80
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'CRITICAL: Only {{ $value }}% phones registered on cluster {{ $labels.callmanager_id }}'
          description: 'Major registration loss. Users are likely unable to make calls.'

      - alert: CDRIngestionStopped
        expr: ct_cdr_ingestion_lag_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'No CDR records received for org {{ $labels.org_id }} in {{ $value }}s'
          description: 'CDR ingestion has stopped. Call records are not being captured. Audit trail at risk.'
          runbook_url: 'https://docs.calltelemetry.com/runbooks/cdr-ingestion-stopped'

      - alert: CDRIngestionCritical
        expr: ct_cdr_ingestion_lag_seconds > 900
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'CDR ingestion down for 15+ minutes (org {{ $labels.org_id }})'
          description: 'No call records for over 15 minutes. SFTP may be broken or CUCM stopped sending CDRs.'

# Prometheus Alert Rules for CallTelemetry
# These rules use metrics from the SystemHealth PromEx plugin (ct_* gauges)
# `for:` provides built-in hysteresis — alert only fires if condition persists
# generator_url links to the relevant Grafana panel for one-click investigation

groups:
  - name: system_health
    rules:
      - alert: HighDiskUsage
        expr: ct_disk_usage_percent{mount="/"} > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Disk usage {{ $value }}% exceeds 90% on mount {{ $labels.mount }}'
          description: 'Root partition disk usage has been above 90% for 5 minutes.'

          generator_url: '/grafana/d/ct-system-health/system-health?viewPanel=3&from=now-1h&to=now'

      - alert: HighCPUUsage
        expr: ct_cpu_usage_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'CPU usage {{ $value }}% exceeds 80%'
          description: 'CPU utilization has been above 80% for 5 minutes.'
          generator_url: '/grafana/d/ct-system-health/system-health?viewPanel=9&from=now-1h&to=now'

      - alert: HighMemoryUsage
        expr: ct_memory_usage_percent > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Memory usage {{ $value }}% exceeds 85%'
          description: 'System memory usage has been above 85% for 5 minutes.'
          generator_url: '/grafana/d/ct-system-health/system-health?viewPanel=10&from=now-1h&to=now'

  - name: application_health
    rules:
      - alert: AppDown
        expr: up{job="calltelemetry"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: 'CallTelemetry API is DOWN'
          description: 'The Call Telemetry API has been unreachable for 30 seconds.'

          generator_url: '/grafana/d/ct-system-resources/system-resources?viewPanel=5&from=now-1h&to=now'

      - alert: NATSDisconnected
        expr: ct_nats_connection_status == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: 'NATS connection lost'
          description: 'The NATS message broker connection has been down for 30 seconds.'
          generator_url: '/grafana/d/ct-system-health/system-health?viewPanel=4&from=now-30m&to=now'

      - alert: HighProcessCount
        expr: ct_beam_process_count > 50000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Active task count {{ $value }} exceeds 50000'
          description: 'High active task count may indicate a resource leak in the Call Telemetry service.'
          generator_url: '/grafana/d/ct-system-resources/system-resources?viewPanel=6&from=now-1h&to=now'

      - alert: BeamMailboxBackup
        expr: ct_beam_mailbox_max_len > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'BEAM process mailbox backing up (depth {{ $value }})'
          description: 'A GenServer is not keeping up with its message queue. Check /api/org/.../system/ops/memory for which process.'
          generator_url: '/grafana/d/ct-system-resources/system-resources?viewPanel=112&from=now-1h&to=now'

      - alert: BeamMemoryGrowthSustained
        expr: increase(ct_prom_ex_beam_memory_allocated_bytes[15m]) > 104857600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'BEAM heap grew >100 MB in 15 minutes'
          description: 'Possible memory leak. Check /api/org/.../system/ops/memory for per-process and ETS detail.'
          generator_url: '/grafana/d/ct-system-resources/system-resources?from=now-1h&to=now'

  - name: oban_health
    rules:
      - alert: ObanRetryableJobs
        expr: ct_oban_queue_depth{state="retryable"} > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Background processing queue {{ $labels.queue }} has {{ $value }} retryable jobs'
          description: 'High retryable job count in the {{ $labels.queue }} queue may indicate persistent failures.'
          generator_url: '/grafana/d/ct-oban-job-health/oban-job-health?viewPanel=4&from=now-1h&to=now'

      - alert: ObanAvailableBacklog
        expr: ct_oban_queue_depth{state="available"} > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Background job backlog: {{ $value | printf "%.0f" }} pending jobs in {{ $labels.queue }} queue'
          description: 'A background processing queue has accumulated pending jobs for over 10 minutes. This may indicate a stalled or failing subsystem.'
          generator_url: '/grafana/d/ct-oban-job-health/oban-job-health?viewPanel=5&from=now-1h&to=now'

      - alert: PurgeHealthQueueRetryable
        expr: ct_oban_queue_depth{queue="db_purge_health", state="retryable"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Data retention health queue has {{ $value }} retryable jobs'
          description: 'The data retention health queue has failing jobs. Purge health audits may not be running.'

      - alert: PurgeDispatchQueueRetryable
        expr: ct_oban_queue_depth{queue="db_purge_dispatch", state="retryable"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Data retention dispatch queue has {{ $value }} retryable jobs'
          description: 'The data retention dispatch queue has failing jobs. Scheduled purges may not be running.'

  - name: call_health
    rules:
      - alert: PhoneRegistrationDrop
        expr: ct_phones_registration_percent < 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Phone registration dropped to {{ $value }}% on cluster {{ $labels.callmanager_id }}'
          description: 'Less than 95% of phones are registered. Possible CUCM or network issue.'

          generator_url: '/grafana/d/ct-phone-registration/phone-registration?viewPanel=5&from=now-1h&to=now'

      - alert: PhoneRegistrationCritical
        expr: ct_phones_registration_percent < 80
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'CRITICAL: Only {{ $value }}% phones registered on cluster {{ $labels.callmanager_id }}'
          description: 'Major registration loss. Users are likely unable to make calls.'
          generator_url: '/grafana/d/ct-phone-registration/phone-registration?viewPanel=5&from=now-30m&to=now'

      - alert: CDRIngestionStopped
        expr: ct_cdr_ingestion_lag_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'No CDR records received for org {{ $labels.org_id }} in {{ $value }}s'
          description: 'CDR ingestion has stopped. Call records are not being captured. Audit trail at risk.'

          generator_url: '/grafana/d/ct-cdr-ingestion/cdr-ingestion?viewPanel=4&from=now-1h&to=now'

      - alert: CDRIngestionCritical
        expr: ct_cdr_ingestion_lag_seconds > 900
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'CDR ingestion down for 15+ minutes (org {{ $labels.org_id }})'
          description: 'No call records for over 15 minutes. SFTP may be broken or CUCM stopped sending CDRs.'
          generator_url: '/grafana/d/ct-cdr-ingestion/cdr-ingestion?viewPanel=4&from=now-1h&to=now'

  - name: license_health
    rules:
      - alert: LicenseExpiringSoon
        expr: ct_license_days_until_expiry < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: 'License for org {{ $labels.org_id }} expires in {{ $value }} days'
          description: 'License expiration is approaching. Renew before it expires to avoid downgrade to Community Edition.'
          generator_url: '/grafana/d/ct-system-health/system-health?viewPanel=15&from=now-7d&to=now'

      - alert: LicenseExpiryCritical
        expr: ct_license_days_until_expiry < 7
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: 'CRITICAL: License for org {{ $labels.org_id }} expires in {{ $value }} days'
          description: 'License is about to expire. Immediate renewal required to prevent service downgrade.'

          generator_url: '/grafana/d/ct-system-health/system-health?viewPanel=15&from=now-7d&to=now'

  - name: certificate_health
    rules:
      - alert: CertificateExpiringSoon
        expr: ct_cert_days_until_expiry < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: 'Certificate {{ $labels.cert_name }} expires in {{ $value }} days'
          description: 'TLS certificate expiration is approaching. Renew to avoid service disruption.'
          generator_url: '/grafana/d/ct-system-health/system-health?viewPanel=15&from=now-7d&to=now'

      - alert: CertificateExpiryCritical
        expr: ct_cert_days_until_expiry < 7
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: 'CRITICAL: Certificate {{ $labels.cert_name }} expires in {{ $value }} days'
          description: 'TLS certificate is about to expire. Immediate renewal required.'
          generator_url: '/grafana/d/ct-system-health/system-health?viewPanel=15&from=now-7d&to=now'

  - name: purge_health
    rules:
      - alert: PurgeDispatcherStale
        expr: ct_purge_last_dispatch_seconds_ago > 7200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Purge dispatcher has not run in over 2 hours'
          description: 'The hourly purge dispatcher has not completed successfully. Tables may grow unchecked.'
          generator_url: '/grafana/d/ct-oban-job-health/oban-job-health?from=now-6h&to=now'

      - alert: PurgeJobFailures
        expr: ct_purge_failed_jobs_count > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Failed purge jobs detected in last 24h'
          description: 'Database purge jobs are failing. Data retention policies may not be enforced.'

      - alert: PurgeTablesAboveMax
        expr: ct_purge_tables_above_max > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'Tables above max size threshold'
          description: 'Tables have exceeded their maximum size. Emergency purging may be needed.'

      - alert: PurgeTablesStale
        expr: ct_purge_tables_stale > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: '{{ $value }} table(s) not purged in 48h for org {{ $labels.org_id }}'
          description: 'Tables have not been purged in over 48 hours. Data retention policies are not being enforced. Check purge dispatcher and background processing queue health.'

      - alert: PurgeAuditCriticalIssues
        expr: ct_purge_audit_critical_issues > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: '{{ $value }} critical issue(s) found in purge audit'
          description: 'The most recent purge audit found critical issues that need attention. Check the purge configuration and audit logs.'

      - alert: PurgeTablesStaleHalf
        expr: ct_purge_tables_stale > (ct_purge_tables_monitored / 2)
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: 'Over half of monitored tables are stale ({{ $value }}) for org {{ $labels.org_id }}'
          description: 'More than 50% of tables have not been purged in 48 hours. Purge system may be completely broken.'

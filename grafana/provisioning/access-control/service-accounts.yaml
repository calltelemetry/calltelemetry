apiVersion: 1

# Provision a service account + static token for PromEx dashboard uploads.
# The token value must match GRAFANA_TOKEN in docker-compose.yml / .env.
# Set both to the same value. This token only has access inside this
# single-tenant Grafana instance and is not exposed externally.

serviceAccounts:
  - orgId: 1
    name: calltelemetry-factory
    role: Admin
    isDisabled: false
    tokens:
      - name: factory-bootstrap-token
        expires: 0  # never expires
        token: changeme

apiVersion: 1

# Provision a service account + static token for PromEx dashboard uploads.
# The token value is intentionally static and non-secret — it only has Admin
# access inside this single-tenant Grafana instance and is not exposed externally.
# This removes the chicken-and-egg problem of needing a token to upload dashboards
# that produce the token. GRAFANA_TOKEN in docker-compose.yml must match `token:`.

serviceAccounts:
  - orgId: 1
    name: calltelemetry-factory
    role: Admin
    isDisabled: false
    tokens:
      - name: factory-bootstrap-token
        expires: 0  # never expires
        token: ct-prom-ex-factory-token-static
